{{- if and .Values.hub.metrics.enabled .Values.monitoring.servicemonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: hub-metrics
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    release: {{ .Values.monitoring.releaseLabel }}
spec:
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  selector:
    matchLabels:
      component: hub
  endpoints:
    - targetPort: 8081
      path: /hub/metrics
      interval: {{ .Values.monitoring.servicemonitor.interval }}
{{- end }}
