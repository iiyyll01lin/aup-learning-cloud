{{- if and .Values.hub.metrics.enabled .Values.monitoring.grafana.dashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-aup-hub-resources
  namespace: {{ .Values.monitoring.namespace }}
  labels:
    grafana_dashboard: "1"
data:
  aup-hub-resources.json: |
{{ .Files.Get "grafana-dashboard-aup-hub-resources.json" | indent 4 }}
{{- end }}
